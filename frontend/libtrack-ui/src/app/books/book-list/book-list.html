<div class="flex justify-between items-center gap-4 mb-5">
  <input #searchBox type="text" placeholder="Search books…"
         class="flex-1 max-w-[320px] mr-0"
         (input)="onSearchInput(searchBox.value)"/>

  <label class="flex items-center gap-2 text-[0.85rem] text-[var(--sage)] whitespace-nowrap">
    Per page
    <select #sizeBox class="mr-0" (change)="onSizeChange(sizeBox.value)">
      <option value="10">10</option>
      <option value="20" selected>20</option>
      <option value="50">50</option>
    </select>
  </label>
</div>

<ul class="flex flex-col gap-[0.6rem] mb-5">
  @for (book of books(); track book.id) {
    <li class="flex items-center gap-5 py-[0.85rem] px-5 mb-0">
      <div class="flex-1 flex flex-col gap-[0.1rem] min-w-0">
        <span class="font-[Georgia,'Times_New_Roman',ui-serif,serif] font-semibold text-[var(--ink)] whitespace-nowrap overflow-hidden text-ellipsis">{{ book.title }}</span>
        <span class="text-[0.82rem] text-[var(--sage)]">{{ book.author }} — {{ book.genre }}</span>
      </div>

      <div class="w-[130px] flex-shrink-0">
        <div class="h-[6px] bg-[#ece5d8] rounded-[3px] overflow-hidden mb-1">
          <div class="h-full bg-[var(--spine)] rounded-[3px]"
               [style.width.%]="(book.availableCopies / book.totalCopies) * 100"></div>
        </div>
        <span class="text-[0.72rem] text-[var(--sage)]">{{ book.availableCopies }} / {{ book.totalCopies }}</span>
      </div>

      <div class="flex gap-2 flex-shrink-0">
        <button class="py-[0.35rem] px-[0.85rem] text-[0.82rem]"
                (click)="editRequested.emit(book)">Edit</button>
        <button class="py-[0.35rem] px-[0.85rem] text-[0.82rem] bg-[#a14b3f] hover:bg-[#8a3d33]"
                (click)="deleteRequested.emit(book)">Delete</button>
      </div>
    </li>
  }
</ul>

<div class="flex items-center gap-4">
  <button (click)="prevPage()" [disabled]="first()">Previous</button>
  <span class="text-[0.9rem] text-[var(--ink)]">Page {{ page() + 1 }} of {{ totalPages() }}</span>
  <button (click)="nextPage()" [disabled]="last()">Next</button>
</div>
