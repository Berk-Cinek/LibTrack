<section>
  <header class="mb-8">
    <h1 class="font-[Georgia,'Times_New_Roman',ui-serif,serif] text-[2rem] font-semibold text-[var(--ink)] m-0 mb-1">Book Catalog</h1>
    <p class="text-[var(--sage)] text-[0.95rem] m-0 mb-5">Search the shelves by title, author, or genre.</p>
  </header>

  <app-search-list
    [items]="books()"
    [loading]="loading()"
    [filterFn]="bookFilter"
    searchPlaceholder="Search books…"
    emptyMessage="No books match your search."
    (select)="selectedBook.set($event)"
  >
    <ng-template let-book>
      <app-book-card [book]="book" (select)="selectedBook.set(book)" />
    </ng-template>
  </app-search-list>
</section>

@if (selectedBook(); as book) {
  <app-book-detail-modal [book]="book" (closed)="selectedBook.set(null)" />
}
