<div class="fixed inset-0 bg-[rgba(36,32,25,0.5)] flex items-center justify-center p-6 z-[1000] animate-fade-in"
     (click)="closed.emit()">
  <div class="relative bg-[var(--paper)] border-l-[5px] border-l-[var(--spine)] rounded-md shadow-[0_20px_50px_rgba(0,0,0,0.25)] py-8 px-9 w-full max-w-[440px] max-h-[85vh] overflow-y-auto animate-slide-up"
       (click)="$event.stopPropagation()">

    <button class="absolute top-3 right-[0.9rem] bg-none border-none text-2xl leading-none text-[var(--sage)] hover:text-[var(--ink)] cursor-pointer p-1"
            (click)="closed.emit()">×</button>

    <p class="text-[0.8rem] text-[var(--sage)] uppercase tracking-[0.03em] m-0 mb-2">{{ book().genre }}</p>
    <h2 class="font-[Georgia,'Times_New_Roman',ui-serif,serif] text-2xl font-semibold text-[var(--ink)] leading-[1.3] m-0 mb-[0.35rem]">{{ book().title }}</h2>
    <p class="text-base text-[var(--ink)] m-0">{{ book().author }}</p>

    <div class="mt-4 mb-3">
      <div class="h-[6px] bg-[#ece5d8] rounded-[3px] overflow-hidden mb-[0.3rem]">
        <div class="h-full bg-[var(--spine)] rounded-[3px]"
             [style.width.%]="(book().availableCopies / book().totalCopies) * 100"></div>
      </div>
      <span class="text-[0.78rem] text-[var(--sage)]">
        {{ book().availableCopies }} / {{ book().totalCopies }} available
      </span>
    </div>

    <div class="h-px bg-[#d8cfc0] my-5"></div>
    <p class="text-[0.8rem] text-[#9a9284] m-0">ISBN {{ book().isbn }}</p>

    <div class="flex gap-[0.6rem] mt-5">
      @if (authService.isLoggedIn()) {
        <button class="bg-[var(--spine)] text-[var(--paper)]" (click)="borrow(book())"
                [disabled]="book().availableCopies === 0">
          Borrow
        </button>
      }
      <button class="bg-none text-[var(--sage)] border border-[#d8cfc0] hover:bg-[#ece5d8] hover:text-[var(--ink)]"
              (click)="closed.emit()">Close</button>
    </div>

    @if (borrowError()) {
      <p class="mt-[0.6rem] text-[0.85rem] text-[#a14b3f] bg-[#fbe9e6] border-l-[3px] border-l-[#a14b3f] rounded py-2 px-3">{{ borrowError() }}</p>
    }
    @if (!authService.isLoggedIn()) {
      <p class="mt-[0.6rem] text-[0.85rem] text-[#a14b3f] bg-[#fbe9e6] border-l-[3px] border-l-[#a14b3f] rounded py-2 px-3">Log in to borrow this book.</p>
    }

  </div>
</div>
