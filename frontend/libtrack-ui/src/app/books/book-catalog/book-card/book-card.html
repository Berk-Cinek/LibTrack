<article class="bg-white rounded border-l-[5px] border-l-[var(--spine)] shadow-[0_1px_3px_rgba(0,0,0,0.08)] py-[1.1rem] px-5 min-h-[220px]"
         (click)="onSelect()">
  <h2 class="font-[Georgia,'Times_New_Roman',ui-serif,serif] text-[1.15rem] font-semibold text-[var(--ink)] m-0 mb-[0.15rem] leading-[1.3] overflow-hidden">{{ book().title }}</h2>
  <p class="text-[0.9rem] text-[var(--ink)] m-0 mb-[0.1rem]">{{ book().author }}</p>
  <p class="text-[0.8rem] text-[var(--sage)] uppercase tracking-[0.03em] m-0 mb-[0.85rem]">{{ book().genre }}</p>

  <div class="mb-3 mt-auto">
    <div class="h-[6px] bg-[#ece5d8] rounded-[3px] overflow-hidden mb-[0.3rem]">
      <div
        class="h-full bg-[var(--spine)] rounded-[3px]"
        [style.width.%]="(book().availableCopies / book().totalCopies) * 100"
      ></div>
    </div>
    <span class="text-[0.78rem] text-[var(--sage)]">
      {{ book().availableCopies }} / {{ book().totalCopies }} available
    </span>
  </div>

  <p class="text-[0.75rem] text-[#9a9284] m-0">ISBN {{ book().isbn }}</p>
</article>
