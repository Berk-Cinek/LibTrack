<h1>Look up a book by ID</h1>
<input #idBox type="number" placeholder="Enter an ID"
       (input)="currentId.set(idBox.value)"/>

<button (click)="loadOne(idBox.value)" [disabled]="!currentId()"> Find </button>

@if (book()) {
  <li> {{ book()!.title }} by {{ book()!.author }} <br>
    ID:{{ book()!.id }}, ISBN:{{ book()!.isbn }} - {{ book()!.genre }} <br>
    Copies:{{ book()!.totalCopies }} / {{ book()!.availableCopies }}
    Created at: {{ book()!.createdAt }}
  </li>
}
