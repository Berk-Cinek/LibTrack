<h1>Partial Update For Books</h1>

<input #idBox type="number" placeholder="Enter an ID"
       (input)="currentId.set(idBox.value)"/>

<form [formGroup]="bookForm">
  <input type="number" formControlName="isbn" placeholder="ISBN"/>
  <input type="text" formControlName="title" placeholder="Title">
  <input type="text" formControlName="author" placeholder="Author">
  <input type="text" formControlName="genre" placeholder="genre">
  <input type="number" formControlName="totalCopies" placeholder="Total Copies">
  <input type="number" formControlName="availableCopies" placeholder="Available Copies">

  <button (click)="submit(idBox.value)" [disabled]="!currentId()"> Submit </button>
</form>

@if(result()){
  <p>Updated: {{ result()!.title }} by {{ result()!.author }} <br>
    ID:{{ result()!.id }}, ISBN:{{ result()!.isbn }} - {{ result()!.genre }} <br>
    Copies:{{ result()!.totalCopies }} / {{ result()!.availableCopies }}
    Created at: {{ result()!.createdAt }}</p>
}
