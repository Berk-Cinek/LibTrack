<h1>Create A Member</h1>

<form [formGroup]="memberForm">
  <input type="number" formControlName="memberNo" placeholder="Member Number"/>
  <input type="text" formControlName="fullName" placeholder="Full Name">
  <input type="text" formControlName="email" placeholder="Email">
  <input type="checkbox" formControlName="isActive" placeholder="Active">

  <button (click)="createOneMember()" [disabled]="memberForm.invalid"> Submit </button>
</form>

@if (member()) {
  <li> {{ member()!.fullName }} No: {{ member()!.memberNo }} <br>
    Email:{{ member()!.email }}, Active Member:{{ member()!.isActive }} <br>
    Created at: {{ member()!.createdAt }}
  </li>
}
