<section>
  <h1>Admin Panel</h1>

  @if (authService.isAdmin()) {

    <div class="flex gap-2 border-b-2 border-[var(--border)] mb-6">
      <button class="bg-none text-[var(--sage)] border-none border-b-[3px] border-b-transparent rounded-none py-[0.6rem] px-5 font-semibold cursor-pointer hover:text-[var(--ink)]"
              [ngClass]="{ 'text-[var(--spine)] border-b-[var(--spine)]': activeTab() === 'books' }"
              (click)="activeTab.set('books')">Books</button>
      <button class="bg-none text-[var(--sage)] border-none border-b-[3px] border-b-transparent rounded-none py-[0.6rem] px-5 font-semibold cursor-pointer hover:text-[var(--ink)]"
              [ngClass]="{ 'text-[var(--spine)] border-b-[var(--spine)]': activeTab() === 'members' }"
              (click)="activeTab.set('members')">Members</button>
      <button class="bg-none text-[var(--sage)] border-none border-b-[3px] border-b-transparent rounded-none py-[0.6rem] px-5 font-semibold cursor-pointer hover:text-[var(--ink)]"
              [ngClass]="{ 'text-[var(--spine)] border-b-[var(--spine)]': activeTab() === 'loans' }"
              (click)="activeTab.set('loans')">Loans</button>
      <button class="bg-none text-[var(--sage)] border-none border-b-[3px] border-b-transparent rounded-none py-[0.6rem] px-5 font-semibold cursor-pointer hover:text-[var(--ink)]"
              [ngClass]="{ 'text-[var(--spine)] border-b-[var(--spine)]': activeTab() === 'fines' }"
              (click)="activeTab.set('fines')">Fines</button>
    </div>

    @switch (activeTab()) {

      @case ('books') {
        <app-book-create (created)="onBookCreated()"/>
        <app-book-list
          (editRequested)="onEditBook($event)"
          (deleteRequested)="onDeleteBook($event)" />

        @if (selectedBook()) {
          <div class="fixed inset-0 bg-[rgba(36,32,25,0.45)] flex items-center justify-center z-[100]" (click)="onCancelBook()">
            <div class="bg-white rounded-lg border-l-[5px] border-l-[var(--spine)] shadow-[0_8px_30px_rgba(0,0,0,0.2)] py-7 px-8 max-w-[520px] w-full" (click)="$event.stopPropagation()">
              <app-book-partial-update [book]="selectedBook()" (saved)="onBookSaved()" />
              <button class="mt-3 bg-none text-[var(--sage)] border border-[var(--border)] hover:bg-[#ece5d8] hover:text-[var(--ink)]" (click)="onCancelBook()">Cancel</button>
            </div>
          </div>
        }
      }

      @case ('members') {
        <app-member-create (created)="onMemberCreated()"/>
        <app-member-list
          (editRequested)="onEditMember($event)"
          (promoteRequested)="onPromoteMember($event)"
          (deleteRequested)="onDeleteMember($event)" />

        @if (selectedMember()) {
          <div class="fixed inset-0 bg-[rgba(36,32,25,0.45)] flex items-center justify-center z-[100]" (click)="onCancelMember()">
            <div class="bg-white rounded-lg border-l-[5px] border-l-[var(--spine)] shadow-[0_8px_30px_rgba(0,0,0,0.2)] py-7 px-8 max-w-[520px] w-full" (click)="$event.stopPropagation()">
              <app-member-partial-update [member]="selectedMember()" (saved)="onMemberSaved()" />
              <button class="mt-3 bg-none text-[var(--sage)] border border-[var(--border)] hover:bg-[#ece5d8] hover:text-[var(--ink)]" (click)="onCancelMember()">Cancel</button>
            </div>
          </div>
        }
      }

      @case ('loans') {
        <app-loan-create />
        <app-loan-list
          (editRequested)="onEditLoan($event)"
          (deleteRequested)="onDeleteLoan($event)" />

        @if (selectedLoan()) {
          <div class="fixed inset-0 bg-[rgba(36,32,25,0.45)] flex items-center justify-center z-[100]" (click)="onCancelLoan()">
            <div class="bg-white rounded-lg border-l-[5px] border-l-[var(--spine)] shadow-[0_8px_30px_rgba(0,0,0,0.2)] py-7 px-8 max-w-[520px] w-full" (click)="$event.stopPropagation()">
              <app-loan-partial-update [loan]="selectedLoan()" (saved)="onLoanSaved()" />
              <button class="mt-3 bg-none text-[var(--sage)] border border-[var(--border)] hover:bg-[#ece5d8] hover:text-[var(--ink)]" (click)="onCancelLoan()">Cancel</button>
            </div>
          </div>
        }
      }

      @case ('fines') {
        <app-fine-list
          (editRequested)="onEditFine($event)"
          (deleteRequested)="onDeleteFine($event)" />

        @if (selectedFine()) {
          <div class="fixed inset-0 bg-[rgba(36,32,25,0.45)] flex items-center justify-center z-[100]" (click)="onCancelFine()">
            <div class="bg-white rounded-lg border-l-[5px] border-l-[var(--spine)] shadow-[0_8px_30px_rgba(0,0,0,0.2)] py-7 px-8 max-w-[520px] w-full" (click)="$event.stopPropagation()">
              <app-fine-partial-update [fine]="selectedFine()" (saved)="onFineSaved()" />
              <button class="mt-3 bg-none text-[var(--sage)] border border-[var(--border)] hover:bg-[#ece5d8] hover:text-[var(--ink)]" (click)="onCancelFine()">Cancel</button>
            </div>
          </div>
        }
      }
    }

  } @else {
    <p class="text-[var(--sage)] italic">Admin access required.</p>
  }
</section>
