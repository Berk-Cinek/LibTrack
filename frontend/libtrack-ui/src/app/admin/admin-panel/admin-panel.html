<section class="admin-panel">
  <h1>Admin Panel</h1>

  @if (authService.isAdmin()) {

    <div class="tab-bar">
      <button [class.active]="activeTab() === 'books'"   (click)="activeTab.set('books')">Books</button>
      <button [class.active]="activeTab() === 'members'" (click)="activeTab.set('members')">Members</button>
      <button [class.active]="activeTab() === 'loans'"   (click)="activeTab.set('loans')">Loans</button>
      <button [class.active]="activeTab() === 'fines'"   (click)="activeTab.set('fines')">Fines</button>
    </div>

    @switch (activeTab()) {

      @case ('books') {
        <app-book-create (created)="onBookCreated()"/>
        <app-book-list
          (editRequested)="onEditBook($event)"
          (deleteRequested)="onDeleteBook($event)" />

        @if (selectedBook()) {
          <div class="modal-backdrop" (click)="onCancelBook()">
            <div class="modal-content" (click)="$event.stopPropagation()">
              <app-book-partial-update [book]="selectedBook()" (saved)="onBookSaved()" />
              <button class="modal-cancel" (click)="onCancelBook()">Cancel</button>
            </div>
          </div>
        }
      }

      @case ('members') {
        <app-member-create />
        <app-member-list
          (editRequested)="onEditMember($event)"
          (deleteRequested)="onDeleteMember($event)" />

        @if (selectedMember()) {
          <div class="modal-backdrop" (click)="onCancelMember()">
            <div class="modal-content" (click)="$event.stopPropagation()">
              <app-member-partial-update [member]="selectedMember()" (saved)="onMemberSaved()" />
              <button class="modal-cancel" (click)="onCancelMember()">Cancel</button>
            </div>
          </div>
        }
      }

      @case ('loans') {
        <app-loan-create />
        <app-loan-list
          (editRequested)="onEditLoan($event)"
          (deleteRequested)="onDeleteLoan($event)" />

        @if (selectedLoan()) {
          <div class="modal-backdrop" (click)="onCancelLoan()">
            <div class="modal-content" (click)="$event.stopPropagation()">
              <app-loan-partial-update [loan]="selectedLoan()" (saved)="onLoanSaved()" />
              <button class="modal-cancel" (click)="onCancelLoan()">Cancel</button>
            </div>
          </div>
        }
      }

      @case ('fines') {
        <app-fine-list
          (editRequested)="onEditFine($event)"
          (deleteRequested)="onDeleteFine($event)" />

        @if (selectedFine()) {
          <div class="modal-backdrop" (click)="onCancelFine()">
            <div class="modal-content" (click)="$event.stopPropagation()">
              <app-fine-partial-update [fine]="selectedFine()" (saved)="onFineSaved()" />
              <button class="modal-cancel" (click)="onCancelFine()">Cancel</button>
            </div>
          </div>
        }
      }
    }

  } @else {
    <p class="status-line">Admin access required.</p>
  }
</section>
