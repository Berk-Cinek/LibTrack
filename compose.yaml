services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=LibTrackDB'
      - 'POSTGRES_PASSWORD=secretDB'
      - 'POSTGRES_USER=user'
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:8.6.4
    ports:
      - "6379:6379"

volumes:
  pgdata: