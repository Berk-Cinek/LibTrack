databaseChangeLog:
  - changeSet:
      id: 001
      author: Berk-Cinek
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: isbn
                  type: VARCHAR(250)
              - column:
                  name: title
                  type: VARCHAR(250)
              - column:
                  name: author
                  type: VARCHAR(250)
              - column:
                  name: genre
                  type: VARCHAR(250)
              - column:
                  name: total_copies
                  type: Integer
              - column:
                  name: available_copies
                  type: Integer
              - column:
                  name: created_at
                  type: DATETIME


        - createTable:
            tableName: members
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: member_no
                  type: BIGINT
              - column:
                  name: full_name
                  type: VARCHAR(100)
              - column:
                  name: email
                  type: VARCHAR(100)
              - column:
                  name: is_active
                  type: BOOLEAN
              - column:
                  name: created_at
                  type: DATETIME


        - createTable:
            tableName: loans
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: borrowed_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: returned_at
                  type: DATETIME
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: loans
            baseColumnNames: member_id
            referencedTableName: members
            referencedColumnNames: id
            constraintName: fk_loans_members
        - addForeignKeyConstraint:
            baseTableName: loans
            baseColumnNames: book_id
            referencedTableName: books
            referencedColumnNames: id
            constraintName: fk_loans_books


        - createTable:
            tableName: fines
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: loan_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: days_overdue
                  type: INTEGER
              - column:
                  name: amount
                  type: INTEGER
              - column:
                  name: is_paid
                  type: BOOLEAN
              - column:
                  name: paid_at
                  type: DATETIME
        - addForeignKeyConstraint:
            baseTableName: fines
            baseColumnNames: loan_id
            referencedTableName: loans
            referencedColumnNames: id
            constraintName: fk_fines_loans
